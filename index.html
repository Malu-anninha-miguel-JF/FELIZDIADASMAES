<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feliz Dia das Mães ❤️</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #ffdde1, #ee9ca7);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      color: #fff;
    }

    .container {
      background: rgba(0,0,0,0.4);
      padding: 20px;
      border-radius: 15px;
      max-width: 800px;
      width: 90%;
    }

    h1 {
      margin-bottom: 20px;
    }

    video {
      width: 100%;
      border-radius: 10px;
    }

    p {
      margin-top: 15px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Feliz Dia das Mães 💐</h1>

    <video controls>
      <source src="video.mp4" type="video/mp4">
      Seu navegador não suporta vídeo.
    </video>

    <p>
      Mãe, essa é uma pequena homenagem para você ❤️<br>
      Obrigado por tudo!
    </p>
  </div>
</body>
</html>

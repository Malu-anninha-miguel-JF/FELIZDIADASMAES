<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feliz Dia das Mães 💐</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #ff9a9e, #fad0c4);
      overflow: hidden;
    }

    .tela {
      display: none;
      height: 100vh;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
      color: white;
    }

    .ativa {
      display: flex;
    }

    h1 {
      font-size: 2.5em;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.2em;
      max-width: 600px;
    }

    button {
      padding: 15px 30px;
      border: none;
      border-radius: 10px;
      background: #ff4d6d;
      color: white;
      font-size: 18px;
      cursor: pointer;
      margin-top: 20px;
      transition: 0.3s;
    }

    button:hover {
      background: #e63950;
    }

    video {
      width: 90%;
      max-width: 700px;
      border-radius: 15px;
      margin-top: 20px;
    }

    /* Corações */
    .coracao {
      position: absolute;
      color: rgba(255,255,255,0.6);
      animation: subir 6s linear infinite;
    }

    @keyframes subir {
      0% {
        transform: translateY(100vh);
        opacity: 0;
      }
      50% {
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <!-- Tela inicial -->
  <div id="inicio" class="tela ativa">
    <h1>Feliz Dia das Mães 💐</h1>
    <h2>Gabriela ❤️</h2>
    <button onclick="iniciar()">Assistir Homenagem</button>
  </div>

  <!-- Tela do vídeo -->
  <div id="videoTela" class="tela">
    <h1>Para você, Mamãe 💖</h1>

    <p>
      Mamãe nós te amamos muito,<br>
      tu és a melhor mãe do mundo! ❤️
    </p>

    <video controls>
      <source src="video.mp4" type="video/mp4">
      Seu navegador não suporta vídeo.
    </video>
  </div>

  <script>
    function iniciar() {
      document.getElementById("inicio").classList.remove("ativa");
      document.getElementById("videoTela").classList.add("ativa");
    }

    // Criar corações animados
    function criarCoracao() {
      const coracao = document.createElement("div");
      coracao.classList.add("coracao");
      coracao.innerHTML = "❤️";

      coracao.style.left = Math.random() * 100 + "vw";
      coracao.style.fontSize = (Math.random() * 20 + 10) + "px";
      coracao.style.animationDuration = (Math.random() * 3 + 3) + "s";

      document.body.appendChild(coracao);

      setTimeout(() => {
        coracao.remove();
      }, 6000);
    }

    setInterval(criarCoracao, 300);
  </script>

</body>
</html>
      Mãe, essa é uma pequena homenagem para você ❤️<br>
      Obrigado por tudo!
    </p>
  </div>
</body>
</html>
